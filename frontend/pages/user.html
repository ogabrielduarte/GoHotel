<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Gabriel S. Duarte, Agatha Marinho Santos">
    <meta name="keywords" content="projeto, IFAL, hotel, reserva">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="shortcut icon" href="../assets/images/favGO.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/perfil-foto.css">
    <title>Perfil</title>
</head>

<body>
    <header class="header">
        <a href="../index.html">
            <img src="../assets/images/GHLOGO.png" class="home">
        </a>

        <nav class="nav">
            <button class="redirect" id="reserva">faça sua reserva!</button>
        </nav>

        <i class="fa-solid fa-sign-out" id="logoutButton"></i>
    </header>

    <div id="sideUser" class="sideUser">
        <div class="foto-perfil-wrapper sideInfo" style="text-align: center;">
            <img src="../assets/images/Uicon.png" id="Uicon" alt="Foto de perfil" title="Clique para mudar sua foto">
            <div class="foto-perfil-hover" id="fotoPerfilHover">
                <i class="fa-solid fa-camera"></i>
            </div>
        </div>
        <div id="Unome" class="sideInfo"><!-- fetch pra pegar o nome de usuario a partir de quem ta logado --></div>
    </div>

    <div class="reservas-user">
        <h1>SUAS RESERVAS</h1>

        <div class="container-reservas">
            <!--reservas dos usuários-->
        </div>
    </div>

    <!-- Modal de troca de foto de perfil -->
    <div id="fotoModalOverlay" class="foto-modal-overlay hidden">
        <div class="foto-modal" id="fotoModal">
            <button class="foto-modal-close" id="fotoModalClose" aria-label="Fechar">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <h2>Mude sua foto</h2>

            <img id="fotoPreview" src="../assets/images/Uicon.png" class="foto-preview" alt="Pré-visualização da foto">

            <label for="fotoInput" class="foto-input-label">
                <i class="fa-solid fa-upload"></i> Escolher imagem
            </label>
            <input type="file" id="fotoInput" accept="image/*" hidden>

            <button id="fotoSalvar" class="foto-salvar-btn" disabled>Salvar foto</button>
        </div>
    </div>
</body>
<script type="module">
    import { verificarLogin } from "./modulos.js"

    const Unome = document.getElementById('Unome');
    const Uicon = document.getElementById('Uicon');



    Unome.innerHTML = `${localStorage.getItem("nome")}`

    reserva.addEventListener("click", () => {
        window.location.href = "./hoteis.html"
    });

    logoutButton.addEventListener("click", () => {
        if (confirm('Você quer encerrar a sessão?')) {
            localStorage.removeItem('token');
            alert('Deslogado com sucesso!');
            location.href = '../index.html';
        }
    });

    // ===== Troca de foto de perfil =====
    const fotoModalOverlay = document.getElementById('fotoModalOverlay');
    const fotoModalClose = document.getElementById('fotoModalClose');
    const fotoInput = document.getElementById('fotoInput');
    const fotoPreview = document.getElementById('fotoPreview');
    const fotoSalvar = document.getElementById('fotoSalvar');

    function abrirModalFoto() {
        fotoPreview.src = Uicon.src;
        fotoInput.value = "";
        fotoSalvar.disabled = true;
        fotoModalOverlay.classList.remove('hidden');
    }

    function fecharModalFoto() {
        fotoModalOverlay.classList.add('hidden');
    }

    Uicon.addEventListener('click', abrirModalFoto);
    fotoModalClose.addEventListener('click', fecharModalFoto);
    fotoModalOverlay.addEventListener('click', (e) => {
        if (e.target === fotoModalOverlay) fecharModalFoto();
    });

    fotoInput.addEventListener('change', () => {
        const arquivo = fotoInput.files[0];
        if (!arquivo) return;

        const leitor = new FileReader();
        leitor.onload = (e) => {
            fotoPreview.src = e.target.result;
            fotoSalvar.disabled = false;
        };
        leitor.readAsDataURL(arquivo);
    });

    async function carregarPerfil() {

        try {

            const response = await fetch(
                `http://localhost:3000/usuarios/${localStorage.getItem("id")}`,
                {
                    headers: {
                        Authorization: `Bearer ${localStorage.getItem("token")}`
                    }
                }
            );

            const usuario = await response.json();

            console.log(usuario);

            if (usuario.nome) {
                Unome.innerHTML = usuario.nome;
            }

            if (usuario.foto) {
                Uicon.src = usuario.foto;
            }

        } catch (erro) {
            console.error("Erro ao carregar perfil:", erro);
        }

    }

    carregarPerfil();

    async function enviarFoto() {

        const arquivo = fotoInput.files[0];

        if (!arquivo) {
            return;
        }

        const formData = new FormData();

        formData.append(
            "foto",
            arquivo
        );

        const response = await fetch(
            `http://localhost:3000/usuarios/${localStorage.getItem("id")}/foto`,
            {
                method: "PATCH",
                headers: {
                    Authorization:
                        `Bearer ${localStorage.getItem("token")}`
                },
                body: formData
            }
        );

        const dados =
            await response.json();

        if (!response.ok) {
            alert(dados.erro);
            return;
        }

        Uicon.src = dados.foto;

        fecharModalFoto();
    }

    fotoSalvar.addEventListener(
        "click",
        enviarFoto
    );

    const containerReservas = document.querySelector(".container-reservas");

    async function listarReservas(container) {

        try {

            const id = localStorage.getItem("id");
            const token = localStorage.getItem("token");

            const resposta = await fetch(
                `http://localhost:3000/usuarios/reservas/${id}`,
                {
                    headers: {
                        Authorization: `Bearer ${token}`
                    }
                }
            );

            const reservas = await resposta.json();

            container.innerHTML = "";

            if (!resposta.ok || !Array.isArray(reservas) || reservas.length === 0) {
                container.innerHTML = `
                <p class="sem-reservas">
                    Você não possui reservas.
                </p>
            `;
                return;
            }

            const lista = document.createElement("div");
            lista.classList.add("lista-reservas");

            reservas.forEach(reserva => {

                const card = document.createElement("div");
                card.classList.add("card-reserva");

                card.innerHTML = `
                <h3>${reserva.hotel?.fantasia || reserva.nomeLocal || "Reserva"}</h3>
                <p>Entrada: ${reserva.dataEntrada || "-"}</p>
                <p>Saída: ${reserva.dataSaida || "-"}</p>

                <div class="buttons">
                    <button
                        class="btn-delete"
                        data-id="${reserva.id}">
                        Cancelar
                    </button>
                </div>
            `;

                lista.appendChild(card);
            });

            container.appendChild(lista);

            lista.querySelectorAll(".btn-delete").forEach(button => {

                button.addEventListener("click", async () => {

                    if (!confirm("Deseja cancelar essa reserva?")) {
                        return;
                    }

                    try {

                        const response = await fetch(
                            `http://localhost:3000/reservas/${button.dataset.id}`,
                            {
                                method: "DELETE",
                                headers: {
                                    Authorization: `Bearer ${token}`
                                }
                            }
                        );

                        const dados = await response.json();

                        if (!response.ok) {
                            alert(dados.erro || "Erro ao cancelar reserva");
                            return;
                        }

                        alert("Reserva cancelada com sucesso!");

                        listarReservas(container);

                    } catch (erro) {
                        console.error(erro);
                        alert("Erro ao cancelar reserva");
                    }
                });

            });

        } catch (erro) {

            console.error(erro);

            container.innerHTML = `
            <p>Erro ao carregar reservas.</p>
        `;
        }
    }

</script>

</html>
