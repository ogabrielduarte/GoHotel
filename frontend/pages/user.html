<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Gabriel S. Duarte, Agatha Marinho Santos">
    <meta name="keywords" content="projeto, IFAL, hotel, reserva">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="shortcut icon" href="../assets/images/favGO.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/perfil-foto.css">
    <title>Perfil</title>
</head>

<body>
    <header class="header">
        <a href="../index.html">
            <img src="../assets/images/GHLOGO.png" class="home">
        </a>

        <nav class="nav">
            <button class="redirect" id="reserva">faça sua reserva!</button>
        </nav>

        <i class="fa-solid fa-sign-out" id="logoutButton"></i>
    </header>

    <div id="sideUser" class="sideUser">
        <div class="foto-perfil-wrapper sideInfo" style="text-align: center;">
            <img src="../assets/images/Uicon.png" id="Uicon" alt="Foto de perfil" title="Clique para mudar sua foto">
            <div class="foto-perfil-hover" id="fotoPerfilHover">
                <i class="fa-solid fa-camera"></i>
            </div>
        </div>
        <div id="Unome" class="sideInfo"><!-- fetch pra pegar o nome de usuario a partir de quem ta logado --></div>
    </div>

    <div class="reservas-user">
        <h1>SUAS RESERVAS</h1>

        <div class="container-reservas">
            <!--reservas dos usuários-->
        </div>
    </div>

    <!-- Modal de troca de foto de perfil -->
    <div id="fotoModalOverlay" class="foto-modal-overlay hidden">
        <div class="foto-modal" id="fotoModal">
            <button class="foto-modal-close" id="fotoModalClose" aria-label="Fechar">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <h2>Mude sua foto</h2>

            <img id="fotoPreview" src="../assets/images/Uicon.png" class="foto-preview" alt="Pré-visualização da foto">

            <label for="fotoInput" class="foto-input-label">
                <i class="fa-solid fa-upload"></i> Escolher imagem
            </label>
            <input type="file" id="fotoInput" accept="image/*" hidden>

            <button id="fotoSalvar" class="foto-salvar-btn" disabled>Salvar foto</button>
        </div>
    </div>
</body>
<script type="module">
    import { verificarLogin } from "./modulos.js"

    const Unome = document.getElementById('Unome');
    const Uicon = document.getElementById('Uicon');

    

    Unome.innerHTML = `${localStorage.getItem("nome")}`

    reserva.addEventListener("click", () => {
        window.location.href = "./hoteis.html"
    });

    logoutButton.addEventListener("click", () => {
        if (confirm('Você quer encerrar a sessão?')) {
            localStorage.removeItem('token');
            alert('Deslogado com sucesso!');
            location.href = './index.html';
        }
    });

    // ===== Troca de foto de perfil =====
    const fotoModalOverlay = document.getElementById('fotoModalOverlay');
    const fotoModalClose = document.getElementById('fotoModalClose');
    const fotoInput = document.getElementById('fotoInput');
    const fotoPreview = document.getElementById('fotoPreview');
    const fotoSalvar = document.getElementById('fotoSalvar');

    function abrirModalFoto() {
        fotoPreview.src = Uicon.src;
        fotoInput.value = "";
        fotoSalvar.disabled = true;
        fotoModalOverlay.classList.remove('hidden');
    }

    function fecharModalFoto() {
        fotoModalOverlay.classList.add('hidden');
    }

    Uicon.addEventListener('click', abrirModalFoto);
    fotoModalClose.addEventListener('click', fecharModalFoto);
    fotoModalOverlay.addEventListener('click', (e) => {
        if (e.target === fotoModalOverlay) fecharModalFoto();
    });

    fotoInput.addEventListener('change', () => {
        const arquivo = fotoInput.files[0];
        if (!arquivo) return;

        const leitor = new FileReader();
        leitor.onload = (e) => {
            fotoPreview.src = e.target.result;
            fotoSalvar.disabled = false;
        };
        leitor.readAsDataURL(arquivo);
    });

    async function enviarFoto() {

        const arquivo = fotoInput.files[0];

        if (!arquivo) {
            return;
        }

        const formData = new FormData();

        formData.append(
            "foto",
            arquivo
        );

        const response = await fetch(
            `http://localhost:3000/usuarios/${localStorage.getItem("id")}/foto`,
            {
                method: "PATCH",
                headers: {
                    Authorization:
                        `Bearer ${localStorage.getItem("token")}`
                },
                body: formData
            }
        );

        const dados =
            await response.json();

        if (!response.ok) {
            alert(dados.erro);
            return;
        }

        Uicon.src = dados.foto;

        fecharModalFoto();
    }

    fotoSalvar.addEventListener(
        "click",
        enviarFoto
    );

</script>

</html>
