<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Gabriel S. Duarte, Agatha Marinho Santos">
    <meta name="keywords" content="projeto, IFAL, hotel, reserva">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="shortcut icon"
        href="../assets/images/favGO.ico"
        type="image/x-icon">

    <link rel="stylesheet" href="../css/style.css">

    <title>Faça sua reserva! | GoHotel</title>
</head>

<body>

    <header class="header">

        <a href="../index.html">
            <img src="../assets/images/GHLOGO.png" class="home">
        </a>

        <i class="fa-regular fa-circle-user" id="perfil"></i>
        <i class="fa-solid fa-sign-out" id="logout"></i>

    </header>

    <div class="card-reserva">
        <!-- Card do hotel -->
    </div>

    <div class="pagamento">
        <!-- Pagamento -->
    </div>

    <script type="module">

        const params = new URLSearchParams(window.location.search);

        const id = params.get('id');

        const response = await fetch(`http://localhost:3000/hoteis/${id}`, {
            method: 'GET'
        });

        const hotelData = await response.json();

        console.log(hotelData);

        function appendHotel(hotelData) {

            const cardReserva = document.createElement('div');

            cardReserva.classList.add('card');

            const hotelNome = document.createElement('h2');

            hotelNome.textContent = hotelData.fantasia;

            const hotelDescricao = document.createElement('p');

            hotelDescricao.textContent = hotelData.descricao;

            cardReserva.appendChild(hotelNome);

            cardReserva.appendChild(hotelDescricao);

            document
                .querySelector('.card-reserva')
                .appendChild(cardReserva);
        }

        appendHotel(hotelData);

    </script>

</body>

</html>
