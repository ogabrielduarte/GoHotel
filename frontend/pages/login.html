<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Gabriel S. Duarte, Agatha Marinho Santos">
    <meta name="keywords" content="projeto, IFAL, hotel, reserva">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/images/favGO.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <title>Cadastre</title>
</head>

<body>
    <div class="sideLogIn">

        <div class="bemvindo">
            <img src="../assets/images/GHLOGO.png" width="300" height="300">
            <h5>Bem-Vindo!</h5>
        </div>


        <div id="bordao">
            <h1 class="titulo">GoHotel</h1>
            <p class="subtitulo">Reserva sem complicação</p>
        </div>

        <footer class="copy">
            <p class="copy">© 2026 GoHotel. All rights reserved</p>
        </footer>
    </div>

    <div class="login">
        <h1><b>Log-In</b></h1>

        <form action="http://localhost:3000/usuarios" method="post">
            <label for="nome">Nome Completo</label>
            <input type="text" name="nome" class="campoLogIn">

            <label for="email">E-Mail</label>
            <input type="email" name="email" class="campoLogIn">

            <label for="senha">Senha</label>
            <input type="password" name="senha" class="campoLogIn">

            <button type="submit" class="subCadastro">
                Enviar
            </button>
        </form>

    </div>

</body>

</html
